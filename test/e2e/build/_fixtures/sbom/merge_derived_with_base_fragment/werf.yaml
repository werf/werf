project: werf-sbom-test
configVersion: 1
build:
  sbom:
    enable: true
    standard: cyclonedx@1.6
---
image: base-level-0
from: registry.werf.io/werf/scratch
sbom:
  fragment: |
    components:
      - name: curl
        type: application
        version: 8.12.1
        purl: pkg:generic/curl@8.12.1
        licenses:
          - license:
              id: Apache-2.0
        hashes:
          - alg: SHA-256
            content: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
---
image: derived-level-1
from: base-level-0
sbom:
  fragment: |
    components: []
git:
  - add: /file
    to: /state0/file
