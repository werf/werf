project: werf-test-e2e-build-sbom-import-stapel
configVersion: 1
build:
  sbom:
    enable: true
    standard: cyclonedx@1.6
---
image: stapel-scratch-based
from: registry.werf.io/werf/scratch
git:
  - add: /file
    to: /state0/file
sbom:
  fragment: |
    components:
      - name: curl
        type: application
        version: 8.12.1
        purl: pkg:generic/curl@8.12.1
        licenses:
          - license:
              id: MIT
        hashes:
          - alg: SHA-256
            content: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
---
image: stapel
from: registry.werf.io/werf/scratch
import:
  - image: stapel-scratch-based
    add: /state0/file
    to: /state0/file
    after: install
sbom:
  fragment: |
    components:
      - name: curl
        type: application
        version: 8.12.1
        purl: pkg:generic/curl@8.12.1
        licenses:
          - license:
              id: MIT
        hashes:
          - alg: SHA-256
            content: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
