project: werf-test-e2e-build-sbom-merge-full
configVersion: 1
build:
  sbom:
    enable: true
    standard: cyclonedx@1.6
---
image: builder
from: registry.werf.io/werf/scratch
git:
  - add: /
    to: /src
sbom:
  fragment: |
    components:
      - name: builder-custom
        bom-ref: builder-custom
        type: library
        version: 1.0.0
        purl: pkg:generic/builder-custom@1.0.0
      - name: builder-dep
        bom-ref: builder-dep
        type: library
        version: 1.0.0
        purl: pkg:generic/builder-dep@1.0.0

    services:
      - name: builder-service
        endpoints:
          - https://builder.example.com

    dependencies:
      - ref: builder-custom
        dependsOn:
          - builder-dep

    declarations:
      assessors:
        - bom-ref: builder-assessor
          thirdParty: false
          organization:
            name: "Builder Org"
      claims:
        - bom-ref: builder-claim
          target: builder-custom
          predicate: "Build dependency verified"

    properties:
      - name: builder-property
        value: builder-value
      - name: builder-stage
        value: build
---
image: app
from: registry.werf.io/werf/scratch
import:
  - image: builder
    add: /src
    to: /app
    after: install
sbom:
  fragment: |
    components:
      - name: app-custom
        bom-ref: app-custom
        type: application
        version: 2.0.0
        purl: pkg:generic/app-custom@2.0.0
      - name: app-dep-a
        bom-ref: app-dep-a
        type: library
        version: 1.0.0
        purl: pkg:generic/app-dep-a@1.0.0
      - name: app-dep-b
        bom-ref: app-dep-b
        type: library
        version: 2.0.0
        purl: pkg:generic/app-dep-b@2.0.0

    services:
      - name: app-api-service
        endpoints:
          - https://app.example.com/api
        authenticated: true

    externalReferences:
      - type: vcs
        url: https://github.com/example/app
      - type: issue-tracker
        url: https://github.com/example/app/issues

    properties:
      - name: app-property
        value: app-value
      - name: environment
        value: production

    dependencies:
      - ref: app-custom
        dependsOn:
          - app-dep-a
          - app-dep-b

    declarations:
      assessors:
        - bom-ref: app-assessor
          thirdParty: true
          organization:
            name: "App Security Org"
      claims:
        - bom-ref: app-claim
          target: app-custom
          predicate: "Application is compliant"

    annotations:
      - text: "Application level annotation"
        annotator:
          organization:
            name: "werf"
        timestamp: "2024-05-24T12:00:00Z"
        subjects:
          - "pkg:generic/app-custom@2.0.0"
