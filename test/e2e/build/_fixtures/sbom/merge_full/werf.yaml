project: werf-test-e2e-build-sbom-merge-full
configVersion: 1
build:
  sbom:
    enable: true
    standard: cyclonedx@1.6
---
image: builder
from: registry.werf.io/werf/scratch
git:
  - add: /
    to: /src
sbom:
  fragment: |
    components:
      - name: builder-custom
        type: library
        version: 1.0.0
        purl: pkg:generic/builder-custom@1.0.0

    services:
      - name: builder-service
        endpoints:
          - https://builder.example.com

    properties:
      - name: builder-property
        value: builder-value
      - name: builder-stage
        value: build
---
image: app
from: registry.werf.io/werf/scratch
import:
  - image: builder
    add: /src
    to: /app
    after: install
sbom:
  fragment: |
    components:
      - name: app-custom
        type: application
        version: 2.0.0
        purl: pkg:generic/app-custom@2.0.0

    services:
      - name: app-api-service
        endpoints:
          - https://app.example.com/api
        authenticated: true

    externalReferences:
      - type: vcs
        url: https://github.com/example/app
      - type: issue-tracker
        url: https://github.com/example/app/issues

    properties:
      - name: app-property
        value: app-value
      - name: environment
        value: production

    annotations:
      - text: "Application level annotation"
        annotator:
          organization:
            name: "werf"
        timestamp: "2024-05-24T12:00:00Z"
        subjects:
          - "pkg:generic/app-custom@2.0.0"
