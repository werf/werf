project: werf-test-e2e-build-import-no-system-dirs
configVersion: 1

---
image: source
from: alpine
shell:
  install:
  - echo "werf-test-no-system-dirs" > /etc/werf-test-marker
---
image: destination
from: scratch
import:
- image: source
  add: /
  to: /
  includePaths:
  - "**/*"
  before: install
