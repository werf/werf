project: werf-test-e2e-build-import-symlink-dest
configVersion: 1

---
image: source
from: registry.werf.io/base/ubuntu:22.04
shell:
  setup:
    - mkdir -p /src/bin
    - echo "hello" > /src/bin/myapp

---
image: target
from: registry.werf.io/base/ubuntu:22.04
shell:
  beforeInstall:
    - rm -rf /bin
    - mkdir -p /usr/bin
    - ln -s usr/bin /bin
import:
  - from: source
    add: /src/bin
    to: /bin
    after: install
