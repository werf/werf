project: none
configVersion: 1
gitWorktree:
  allowFetchOriginBranchesAndTags: false
---
image: backend
from: registry.werf.io/base/python:alpine
fromCacheVersion: {{ env "FROM_CACHE_VERSION" }}
shell:
  install:
    - mkdir -p /app && chmod 0755 /app
    - |
      cat << 'EOF' > /app/index.html
      <!DOCTYPE html>
      <html>
        <body>
          <h2>Congratulations!</h2>
          <img src="https://flant.com/images/logo_en.png" style="max-height:100%;" height="76">
        </body>
      </html>
      EOF
