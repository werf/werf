name: docs:deploy:production (internal)

on:
  workflow_call:
    inputs:
      targetCluster:
        required: true
        type: string
      kubeConfigSecretPath:
        required: true
        type: string
      docsDeployTarget:
        required: false
        default: ""
        type: string
      docsDeployLatestAliasEnabled:
        required: false
        default: false
        type: boolean
      persistent:
        default: true
        type: boolean
      runner:
        default: prod-github-runner-0
        type: string

defaults:
  run:
    shell: bash

jobs:
  deploy-production:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set dynamic WERF_* env vars
        run: |
          docs_deploy_target='${{ inputs.docsDeployTarget }}'
          github_ref_value='${{ github.ref }}'

          strip_ref_prefix() {
            local ref="$1"

            ref="${ref#refs/heads/}"
            ref="${ref#refs/tags/}"
            ref="${ref#refs/pull/}"

            printf '%s' "$ref"
          }

          slugify_release_ref() {
            local ref

            ref="$(strip_ref_prefix "$1")"
            ref="${ref//\//-}"
            ref="${ref//+/-plus-}"
            ref="${ref//_/-u-}"
            ref="${ref//./-dot-}"

            printf '%s' "$ref"
          }

          if ${{ inputs.persistent }}; then
            if [[ -n "$docs_deploy_target" ]]; then
              release_ref_value="$(slugify_release_ref "$docs_deploy_target")"
            else
              release_ref_value="$(slugify_release_ref "$github_ref_value")"
            fi

            cat >> "$GITHUB_ENV" <<EOF
          WERF_RELEASE=werfio-${release_ref_value}-production
          WERF_SET_GITHUB_REF=global.github_ref=$github_ref_value
          WERF_SET_DOCS_DEPLOY_TARGET=global.docs_deploy_target=${docs_deploy_target}
          WERF_SET_DOCS_DEPLOY_LATEST_ALIAS_ENABLED=global.docs_deploy_latest_alias_enabled=${{ inputs.docsDeployLatestAliasEnabled }}
          EOF
          else
            cat >> "$GITHUB_ENV" <<EOF
          WERF_RELEASE=werfio-documentation-production
          WERF_SET_GITHUB_REF=global.github_ref=main
          EOF
          fi

      - name: Install werf
        uses: werf/actions/install@v2

      - name: Authenticate in Seguro
        id: vault
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: werf-web
          method: jwt
          jwtGithubAudience: github-access-aud
          exportToken: true

      - name: Read and normalize kubeconfig from Bob
        id: kubeconfig
        run: |
          set -euo pipefail

          response="$(curl -fsSL -H "X-Vault-Token: $VAULT_TOKEN" "https://seguro.flant.com/v1/${{ inputs.kubeConfigSecretPath }}")"
          secret_value="$(printf '%s' "$response" | jq -r '.data.data["kube.config"]')"

          if [[ -z "$secret_value" || "$secret_value" == "null" ]]; then
            echo "Bob kubeconfig secret is empty" >&2
            exit 1
          fi

          if printf '%s' "$secret_value" | base64 -d >/tmp/docs-kubeconfig-decoded 2>/dev/null && grep -q '^apiVersion:' /tmp/docs-kubeconfig-decoded; then
            kubeconfig_base64="$secret_value"
          else
            kubeconfig_base64="$(printf '%s' "$secret_value" | base64 | tr -d '\n')"
          fi

          echo "::add-mask::$kubeconfig_base64"
          echo "kubeconfig_base64=$kubeconfig_base64" >> "$GITHUB_OUTPUT"

      - name: Deploy production docs
        run: |
          set -euo pipefail

          ci_env_file="$(werf ci-env github --as-file)"
          . "$ci_env_file"
          werf converge --set "global.targetCluster=${{ inputs.targetCluster }}"
        env:
          WERF_NAMESPACE: werfio-production
          WERF_DIR: docs
          WERF_LOG_VERBOSE: on
          WERF_REPO: ghcr.io/${{ github.repository_owner }}/werfio
          WERF_ENV: production
          WERF_KUBE_CONFIG_BASE64: ${{ steps.kubeconfig.outputs.kubeconfig_base64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
