name: docs:deploy:test

on:
  push:
    branches:
      - chore/docs/update-major-routing
  workflow_dispatch:
    inputs:
      gitRef:
        description: "Branch, tag or ref to checkout"
        required: false
        default: ""
        type: string
      releaseRef:
        description: "Unique release slug for test deploy; empty means selected branch/tag"
        required: false
        default: "docs-major-routing-v2"
        type: string
      docsDeployTarget:
        description: "Stable docs root to expose, for example v2"
        required: false
        default: "v2"
        type: string
      docsDeployLatestAliasEnabled:
        description: "Also expose /docs/latest/ as alias to docsDeployTarget"
        required: true
        default: true
        type: boolean

jobs:
  deploy-test:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docs_deploy.yml
    with:
      checkoutRef: ${{ github.event_name == 'workflow_dispatch' && inputs.gitRef || github.ref_name }}
      env: test
      githubRefOverride: ${{ github.event_name == 'workflow_dispatch' && inputs.gitRef || github.ref_name }}
      releaseRefOverride: ${{ github.event_name == 'workflow_dispatch' && inputs.releaseRef || 'docs-major-routing-v2' }}
      docsDeployTarget: ${{ github.event_name == 'workflow_dispatch' && inputs.docsDeployTarget || 'v2' }}
      docsDeployLatestAliasEnabled: ${{ github.event_name != 'workflow_dispatch' || inputs.docsDeployLatestAliasEnabled }}
      persistent: true
      runner: prod-github-runner-0
    secrets:
      kubeConfig: ${{ secrets.KUBECONFIG_BASE64_DEV }}
