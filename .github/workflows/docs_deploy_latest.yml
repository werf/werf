name: docs:deploy:latest

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: ["docs:deploy:latest"]
  workflow_dispatch:
    inputs:
      targetCluster:
        description: "Target cluster"
        required: true
        default: all
        type: choice
        options:
          - all
          - ru
          - eu

jobs:
  resolve-current-major:
    runs-on: ubuntu-22.04
    outputs:
      docsDeployTarget: ${{ steps.read.outputs.docs_deploy_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read current docs major target
        id: read
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require 'yaml'

          values = YAML.load_file('docs/.helm/values.yaml')
          target = values.fetch('global').fetch('currentDocsMajorTarget')

          File.open(ENV.fetch('GITHUB_OUTPUT'), 'a') do |f|
            f.puts "docs_deploy_target=#{target}"
          end
          RUBY

  deploy-prod-ru:
    needs: resolve-current-major
    if: ${{ (github.event_name == 'push') || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && (github.event.inputs.targetCluster == 'all' || github.event.inputs.targetCluster == 'ru')) }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/_docs_deploy_production.yml
    with:
      checkoutRef: main
      docsDeployTarget: ${{ needs.resolve-current-major.outputs.docsDeployTarget }}
      docsDeployLatestAliasEnabled: true
      githubRefOverride: refs/heads/main
      persistent: true
      targetCluster: ru
      runner: prod-github-runner-0
      kubeConfigSecretPath: projects/data/b454e6aa-39f0-45f4-aa7c-a9465ab154cb/KUBE_CONFIG_RU

  deploy-prod-eu:
    needs: resolve-current-major
    if: ${{ (github.event_name == 'push') || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && (github.event.inputs.targetCluster == 'all' || github.event.inputs.targetCluster == 'eu')) }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/_docs_deploy_production.yml
    with:
      checkoutRef: main
      docsDeployTarget: ${{ needs.resolve-current-major.outputs.docsDeployTarget }}
      docsDeployLatestAliasEnabled: true
      githubRefOverride: refs/heads/main
      persistent: true
      targetCluster: eu
      runner: prod-github-runner-0
      kubeConfigSecretPath: projects/data/b454e6aa-39f0-45f4-aa7c-a9465ab154cb/KUBE_CONFIG

  notify:
    if: always()
    needs:
      - deploy-prod-ru
      - deploy-prod-eu
    uses: werf/common-ci/.github/workflows/notification.yml@main
    secrets:
      loopNotificationGroup: ${{ secrets.LOOP_NOTIFICATION_GROUP }}
      webhook: ${{ secrets.LOOP_NOTIFICATION_WEBHOOK }}
      notificationChannel: ${{ secrets.LOOP_NOTIFICATION_CHANNEL }}
