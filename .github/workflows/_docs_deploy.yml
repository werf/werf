name: xxxxx(internal)

on:
  workflow_call:
    inputs:
      checkoutRef:
        required: false
        default: ""
        type: string
      env:
        required: true
        type: string
      githubRefOverride:
        required: false
        default: ""
        type: string
      releaseRefOverride:
        required: false
        default: ""
        type: string
      docsDeployTarget:
        required: false
        default: ""
        type: string
      docsDeployLatestAliasEnabled:
        required: false
        default: false
        type: boolean
      persistent:
        default: false
        type: boolean
      runner:
        default: ubuntu-22.04
        type: string
    secrets:
      kubeConfig:
        required: true

defaults:
  run:
    shell: bash

jobs:
  _:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkoutRef != '' && inputs.checkoutRef || github.ref }}

      - name: Set dynamic WERF_* env vars
        run: |
          checkout_ref='${{ inputs.checkoutRef }}'
          default_ref='${{ github.ref }}'
          docs_deploy_target='${{ inputs.docsDeployTarget }}'
          github_ref_override='${{ inputs.githubRefOverride }}'
          release_ref_override='${{ inputs.releaseRefOverride }}'
          pr_number='${{ github.event.pull_request.number }}'

          strip_ref_prefix() {
            local ref="$1"

            ref="${ref#refs/heads/}"
            ref="${ref#refs/tags/}"
            ref="${ref#refs/pull/}"

            printf '%s' "$ref"
          }

          normalize_github_ref() {
            local ref

            ref="$(strip_ref_prefix "$1")"
            ref="${ref//\//-}"

            printf '%s' "$ref"
          }

          slugify_release_ref() {
            local ref

            ref="$(strip_ref_prefix "$1")"
            ref="${ref//\//-}"
            ref="${ref//+/-plus-}"
            ref="${ref//_/-u-}"
            ref="${ref//./-dot-}"

            printf '%s' "$ref"
          }

          if ${{ inputs.persistent }}; then
            github_ref_source="$default_ref"
            if [[ -n "$checkout_ref" ]]; then
              github_ref_source="$checkout_ref"
            fi
            if [[ -n "$github_ref_override" ]]; then
              github_ref_source="$github_ref_override"
            fi

            if [[ -n "$github_ref_override" || -n "$checkout_ref" || -z "$pr_number" ]]; then
              github_ref_value="$(normalize_github_ref "$github_ref_source")"
            else
              github_ref_value="pr-${pr_number}"
            fi

            release_ref_source="$default_ref"
            if [[ -n "$checkout_ref" ]]; then
              release_ref_source="$checkout_ref"
            fi
            if [[ -n "$github_ref_override" ]]; then
              release_ref_source="$github_ref_override"
            fi
            if [[ -n "$release_ref_override" ]]; then
              release_ref_source="$release_ref_override"
            fi

            release_ref_value="$(slugify_release_ref "$release_ref_source")"

            cat >> "$GITHUB_ENV" <<EOF
          WERF_RELEASE=werfio-${release_ref_value}-${{ inputs.env }}
          WERF_SET_GITHUB_REF=global.github_ref=$github_ref_value
          WERF_SET_DOCS_DEPLOY_TARGET=global.docs_deploy_target=${docs_deploy_target}
          WERF_SET_DOCS_DEPLOY_LATEST_ALIAS_ENABLED=global.docs_deploy_latest_alias_enabled=${{ inputs.docsDeployLatestAliasEnabled }}
          EOF
          else
            cat >> "$GITHUB_ENV" <<EOF
          WERF_RELEASE=werfio-documentation-${{ inputs.env }}
          WERF_SET_GITHUB_REF=global.github_ref=main
          EOF
          fi

      - name: Install werf
        uses: werf/actions/install@v2

      - name: Deploy
        run: |
          set -euo pipefail

          ci_env_file="$(werf ci-env github --as-file)"
          . "$ci_env_file"
          werf converge --virtual-merge=false
        env:
          WERF_NAMESPACE: werfio-${{ inputs.env }}
          WERF_DIR: docs
          WERF_LOG_VERBOSE: on
          WERF_REPO: ghcr.io/${{ github.repository_owner }}/werfio
          WERF_ENV: ${{ inputs.env }}
          WERF_KUBE_CONFIG_BASE64: ${{ secrets.kubeConfig }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
