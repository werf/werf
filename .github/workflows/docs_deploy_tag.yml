name: docs:deploy:tag

on:
  push:
    tags:
      - "v2.*"
      - "v1.2.*"
  repository_dispatch:
    types: ["docs:deploy:tag"]
  workflow_dispatch:
    inputs:
      targetCluster:
        description: "Target cluster"
        required: true
        default: all
        type: choice
        options:
          - all
          - ru
          - eu
      gitRef:
        description: "Tag or ref to deploy manually (for example: v2.66.1)"
        required: false
        default: ""
        type: string

jobs:
  deploy-prod-ru:
    if: ${{ github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event.inputs.targetCluster == 'all' || github.event.inputs.targetCluster == 'ru' }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/_docs_deploy_production.yml
    with:
      persistent: true
      targetCluster: ru
      runner: prod-github-runner-0
      kubeConfigSecretPath: projects/data/b454e6aa-39f0-45f4-aa7c-a9465ab154cb/KUBE_CONFIG_RU
      githubRefOverride: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gitRef || '' }}
      releaseRefOverride: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gitRef || '' }}

  deploy-prod-eu:
    if: ${{ github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event.inputs.targetCluster == 'all' || github.event.inputs.targetCluster == 'eu' }}
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/_docs_deploy_production.yml
    with:
      persistent: true
      targetCluster: eu
      runner: prod-github-runner-0
      kubeConfigSecretPath: projects/data/b454e6aa-39f0-45f4-aa7c-a9465ab154cb/KUBE_CONFIG
      githubRefOverride: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gitRef || '' }}
      releaseRefOverride: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gitRef || '' }}

  notify:
    if: always()
    needs:
      - deploy-prod-ru
      - deploy-prod-eu
    uses: werf/common-ci/.github/workflows/notification.yml@main
    secrets:
      loopNotificationGroup: ${{ secrets.LOOP_NOTIFICATION_GROUP }}
      webhook: ${{ secrets.LOOP_NOTIFICATION_WEBHOOK }}
      notificationChannel: ${{ secrets.LOOP_NOTIFICATION_CHANNEL }}
