global:
  targetCluster: ""

clusters:
  eu:
    placement:
      nodeSelector: {}
      tolerations: []
      affinity: {}
  ru:
    placement:
      nodeSelector: {}
      tolerations: []
      affinity: {}

priorityClassName:
  _default: develop
  production: production-medium
host:
  production: werf.io
  test: werf.test.flant.dev
  _default: werf.test.flant.dev

ingressSecretName:
  _default: wildcard-dev-flant-dev
  test: wildcard-test-flant-dev

ingressClassName:
  _default: "nginx"
  production: "standalone-geo"

resources:
  requests:
    memory:
      _default: 20M
      production: 50M
  limits:
    memory:
      _default: 20M
      production: 50M

docs:
  currentRoot: v2
  supportedRoots: [v2, v1.2]
  latestAliasEnabled: true
