project: none
configVersion: 1
---
image: image
from: {{ env "BASE_REGISTRY" | default "registry.ci.werf.io/base" }}/ubuntu:latest
import:
- image: artifact
  add: /app
  to: /app
  after: setup
---
image: artifact
final: false
from: {{ env "BASE_REGISTRY" | default "registry.ci.werf.io/base" }}/ubuntu:latest
disableGitAfterPatch: true
git:
- to: /app
  stageDependencies:
    install: install
    beforeSetup: beforeSetup
    setup: setup
shell:
  install: date
  beforeSetup: date
  setup: date
