project: none
configVersion: 1
---
image: artifact
final: false
from: {{ env "BASE_REGISTRY" | default "registry.ci.werf.io/base" }}/ubuntu:18.04
shell:
  setup:
    - mkdir -p /app
    - echo VERSION_2 > /app/file
    - ln -s /app /link_dir
---
image: app
from: {{ env "BASE_REGISTRY" | default "registry.ci.werf.io/base" }}/alpine:latest
import:
  - image: artifact
    add: /link_dir
    to: /dir
    after: install
