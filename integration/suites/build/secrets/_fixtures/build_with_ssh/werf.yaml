project: werf-test-e2e-build-simple
configVersion: 1

---
image: dockerfile
dockerfile: Dockerfile
args:
  BASE_REGISTRY: {{ env "BASE_REGISTRY" | default "registry.ci.werf.io/base" }}s

---
image: stapel-shell
from: {{ env "BASE_REGISTRY" | default "registry.ci.werf.io/base" }}/ubuntu:22.04
git:
  - add: /file
    to: /file
shell:
  install:
    - apt update
    - apt install -yq openssh-client
    - ssh-add -L && echo "SSH agent is available"
